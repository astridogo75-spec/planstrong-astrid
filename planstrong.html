function getEx(key,intensity,week){const ex=PLAN_DATA[key]?.[intensity];if(!ex)return null;const sets=ex.weeks[week-1]||[];return{sets,totalReps:sets.reduce((a,b)=>a+b,0),kg:ex.kg,rm:ex.rm};}
function sessionVol(session,week){return SESSIONS[session].reduce((acc,{key,intensity})=>{const d=getEx(key,intensity,week);return acc+(d?d.totalReps*d.kg:0);},0);}
function weekStats(week){let reps=0,vol=0;Object.values(SESSIONS).forEach(list=>list.forEach(({key,intensity})=>{const d=getEx(key,intensity,week);if(d){reps+=d.totalReps;vol+=d.totalReps*d.kg;}}));return{reps,vol};}
const SK="ps_astrid_v3";const DEF={week:1,done:{}};
function load(){try{return JSON.parse(localStorage.getItem(SK))||DEF;}catch{return DEF;}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}

function App(){
  const [st,setSt]=useState(load);
  const [tab,setTab]=useState("seance");

  const isDone=(w,s)=>!!st.done[`${w}_${s}`];
  function markDone(w,s){
    setCelebrating(true);
    setTimeout(()=>{setSt(p=>{const d={...p.done};d[`${w}_${s}`]=true;return{...p,done:d};});setCelebrating(false);setConfirm(null);},1600);

          <button style={{background:"transparent",border:"none",color:"#555",cursor:"pointer",fontSize:14,marginBottom:28,display:"block"}} onClick={()=>setConfirm(null)}>← Retour</button>

          <div style={{fontSize:12,color:"#555",marginBottom:32}}>Semaine {confirm.week} · Session {confirm.session}</div>
          <button style={{width:"100%",padding:"17px",background:"#C8F135",border:"none",borderRadius:14,fontSize:14,fontWeight:900,letterSpacing:2,color:"#000",cursor:"pointer",marginBottom:10}} onClick={()=>markDone(confirm.week,confirm.session)}>OUI, C'EST FAIT !</button>

    <div style={{...C.header}}><div style={{...C.brand}}>PLAN <span style={{color:"#C8F135"}}>STRONG</span></div><div style={{...C.brandSub}}>ASTRID D. · 12 SEMAINES</div></div>

        <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
          {[["#C8F135","Actuelle"],["#4ECDC4","Complétée"],["#4ECDC470","Partielle"],["#1e1e2e","À venir"]].map(([col,lbl])=>(
            <div key={lbl} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:col}}/><span style={{fontSize:9,color:"#444"}}>{lbl}</span></div>
          ))}
        </div>
      </div>
      {ws.map(w=>{const pct=maxV>0?Math.round((w.vol/maxV)*100):0,cur=w.w===st.week;return(
        <div key={w.w} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #0f0f18"}}>
          <div style={{width:22,fontSize:13,fontWeight:700,color:cur?"#C8F135":"#555",fontFamily:"Impact,sans-serif",textAlign:"center"}}>{w.w}</div>
          <div style={{flex:1}}><div style={{height:5,background:"#131320",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:cur?"#C8F135":w.done===3?"#4ECDC4":"#2a2a3a",borderRadius:3}}/></div></div>
          <div style={{fontSize:10,color:cur?"#C8F135":"#555",width:58,textAlign:"right"}}>{w.vol.toLocaleString()}</div>
          <div style={{fontSize:10,color:"#4ECDC4",width:24,textAlign:"right"}}>{w.done}/3</div>
        </div>);})}
    </div>)}
    {sec==="sessions"&&(<div style={{padding:"0 16px"}}>
      {svols.map(({s,col,label,total,avg})=>(
        <div key={s} style={{background:"#10101c",borderRadius:14,padding:"14px",marginBottom:10,border:"1px solid #1a1a28",borderLeft:`3px solid ${col}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div><div style={{fontSize:18,fontWeight:900,color:col,fontFamily:"Impact,sans-serif",letterSpacing:2}}>SESSION {s}</div><div style={{fontSize:9,color:"#555",letterSpacing:1}}>{label.toUpperCase()}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:900,color:"#fff",fontFamily:"Impact,sans-serif"}}>{(total/1000).toFixed(1)}<span style={{fontSize:11,color:"#555"}}>k</span></div><div style={{fontSize:8,color:"#444"}}>kg·reps total</div></div>
          </div>
          <div style={{height:10,background:"#0c0c14",borderRadius:5,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",width:`${(total/maxSV)*100}%`,background:`linear-gradient(90deg,${col}88,${col})`,borderRadius:5}}/></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:9,color:"#444"}}>{avg.toLocaleString()} kg·reps / sem. moy.</span><span style={{fontSize:9,color:col}}>{SESSIONS[s].length} exercices</span></div>
        </div>
      ))}
      <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>COMPARAISON PAR SEMAINE</div>
      <div style={{background:"#10101c",borderRadius:14,padding:"14px",border:"1px solid #1a1a28",marginBottom:16}}>
        {ws.map(w=>{const vals=svols.map(({s,col})=>({col,v:sessionVol(s,w.w)}));const maxW=Math.max(...vals.map(x=>x.v));return(
          <div key={w.w} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{width:20,fontSize:11,color:w.w===st.week?"#C8F135":"#555",fontWeight:w.w===st.week?700:400}}>{w.w}</div>
            <div style={{flex:1,display:"flex",gap:3,height:14}}>{vals.map(({col,v},i)=><div key={i} style={{flex:1,background:"#0c0c14",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:maxW>0?`${(v/maxW)*100}%`:"0%",background:col,borderRadius:2}}/></div>)}</div>
          </div>);})}
        <div style={{display:"flex",gap:12,marginTop:8}}>{svols.map(({s,col})=><div key={s} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:col}}/><span style={{fontSize:9,color:"#444"}}>Session {s}</span></div>)}</div>
      </div>
    </div>)}
    {sec==="exercices"&&(<div style={{padding:"0 16px"}}>
      <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:12}}>VOLUME TOTAL PAR EXERCICE · 12 SEM.</div>
      {exVols.map(({key,name,total},i)=>{const pct=(total/maxEV)*100,col=exColors[i%exColors.length];return(
        <div key={key} style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:col,flexShrink:0}}/><span style={{fontSize:12,fontWeight:700,color:"#ddd"}}>{name}</span></div>
            <span style={{fontSize:11,color:col,fontWeight:900}}>{total.toLocaleString()} <span style={{fontSize:9,color:"#444"}}>kg·reps</span></span>
          </div>
          <div style={{height:10,background:"#10101c",borderRadius:5,overflow:"hidden",border:"1px solid #1a1a28"}}><div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${col}66,${col})`,borderRadius:5}}/></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:8,color:"#333"}}>{Math.round(pct)}% du max</span><span style={{fontSize:8,color:"#333"}}>#{i+1}</span></div>
        </div>);})}
    </div>)}
    <div style={{height:24}}/>
  </>);}

const C={
  root:{fontFamily:"'SF Pro Display','Helvetica Neue',Arial,sans-serif",background:"#0c0c14",height:"100%",maxWidth:480,margin:"0 auto",color:"#fff",display:"flex",flexDirection:"column",position:"relative",WebkitTextSizeAdjust:"100%"},
  header:{padding:"28px 16px 14px",borderBottom:"1px solid #151520"},
  brand:{fontSize:30,fontWeight:900,letterSpacing:3,fontFamily:"Impact,'Arial Black',sans-serif"},
  brandSub:{fontSize:10,color:"#333",letterSpacing:3,marginTop:2},
  nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",background:"rgba(12,12,20,0.97)",borderTop:"1px solid #151520",padding:"8px 0 env(safe-area-inset-bottom,14px)",zIndex:99},
  navBtn:{flex:1,background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0"},
};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
